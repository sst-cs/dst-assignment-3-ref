name: Autograde Data Visualisation

on: [push, workflow_dispatch]

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      statuses: write
      checks: write

    steps:
      - name: Checkout student submission
        uses: actions/checkout@v4

      - name: Checkout hidden tests
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: sst-cs/dst-assignment-3-tests
          token: ${{ secrets.HIDDEN_TESTS_TOKEN }}
          path: hidden-tests

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt

      - name: Task 1 – Data Loading
        id: task1_data
        uses: education/autograding-command-grader@v1
        continue-on-error: true
        with:
          test-name: 'task1_data'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "df_loaded or df_shape_var or summary_stats"'
          timeout: 30
          max-score: 1

      - name: Task 2 – Data Cleaning
        id: task2_cleaning
        uses: education/autograding-command-grader@v1
        continue-on-error: true
        with:
          test-name: 'task2_cleaning'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "clean"'
          timeout: 30
          max-score: 2

      - name: Task 3 – Feature Engineering
        id: task3_features
        uses: education/autograding-command-grader@v1
        continue-on-error: true
        with:
          test-name: 'task3_features'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "decade or genre_stats or top_genres"'
          timeout: 30
          max-score: 2

      - name: Task 4 – Top 10 Movies
        id: task4_top
        uses: education/autograding-command-grader@v1
        continue-on-error: true
        with:
          test-name: 'task4_top'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "top_movies"'
          timeout: 30
          max-score: 1

      - name: Tasks 5-7 – Basic Visualisations (fig1, fig2, fig3)
        id: task5_figs_basic
        uses: education/autograding-command-grader@v1
        continue-on-error: true
        with:
          test-name: 'task5_figs_basic'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "fig1 or fig2 or fig3"'
          timeout: 60
          max-score: 1

      - name: Tasks 8-9 – Analysis Visualisations (fig4, fig5)
        id: task6_figs_mid
        uses: education/autograding-command-grader@v1
        continue-on-error: true
        with:
          test-name: 'task6_figs_mid'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "fig4 or fig5"'
          timeout: 60
          max-score: 1

      - name: Tasks 10-12 – Advanced Visualisations (fig6, fig7, fig8)
        id: task7_figs_adv
        uses: education/autograding-command-grader@v1
        continue-on-error: true
        with:
          test-name: 'task7_figs_adv'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "fig6 or fig7 or fig8"'
          timeout: 120
          max-score: 2

      - name: Package Results
        id: package
        run: |
          DATA=$(echo "${{steps.task1_data.outputs.result}}"       | base64 -d 2>/dev/null | jq '.tests[0].score // .score // 0')
          CLEAN=$(echo "${{steps.task2_cleaning.outputs.result}}"  | base64 -d 2>/dev/null | jq '.tests[0].score // .score // 0')
          FEAT=$(echo "${{steps.task3_features.outputs.result}}"   | base64 -d 2>/dev/null | jq '.tests[0].score // .score // 0')
          TOP=$(echo "${{steps.task4_top.outputs.result}}"         | base64 -d 2>/dev/null | jq '.tests[0].score // .score // 0')
          BASIC=$(echo "${{steps.task5_figs_basic.outputs.result}}"| base64 -d 2>/dev/null | jq '.tests[0].score // .score // 0')
          MID=$(echo "${{steps.task6_figs_mid.outputs.result}}"    | base64 -d 2>/dev/null | jq '.tests[0].score // .score // 0')
          ADV=$(echo "${{steps.task7_figs_adv.outputs.result}}"    | base64 -d 2>/dev/null | jq '.tests[0].score // .score // 0')

          TOTAL=$(( ${DATA:-0} + ${CLEAN:-0} + ${FEAT:-0} + ${TOP:-0} + ${BASIC:-0} + ${MID:-0} + ${ADV:-0} ))
          echo "Calculated Total Score: $TOTAL / 10"

          for i in $(seq 1 10); do
            STATUS="fail"; SCORE=0
            if [ $i -le $TOTAL ]; then STATUS="pass"; SCORE=1; fi
            JSON="{\"version\":1,\"status\":\"$STATUS\",\"max_score\":1,\"tests\":[{\"name\":\"Requirement $i\",\"status\":\"$STATUS\",\"score\":$SCORE,\"max_score\":1}]}"
            B64=$(echo -n "$JSON" | base64 -w 0)
            echo "R${i}_RESULTS=$B64" >> $GITHUB_ENV
          done

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        continue-on-error: true
        with:
          runners: r1,r2,r3,r4,r5,r6,r7,r8,r9,r10
